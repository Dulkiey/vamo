<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Grazi 💖</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --rosa: #ff4d6d; --rosa-brilho: rgba(255, 77, 109, 0.6); --amarelo: #ffd700; --progresso: 0%; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle, #3d051e 0%, #1a0510 100%);
            color: #fff; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            transition: background 1s ease;
        }

        #parallax-bg { position: fixed; inset: -50px; pointer-events: none; z-index: 1; transition: transform 0.1s ease-out; }

        #progress-bar {
            position: fixed; top: 0; left: 0; height: 5px;
            width: var(--progresso);
            background: var(--rosa);
            box-shadow: 0 0 10px var(--rosa);
            z-index: 10000; transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .vibe-ativa #progress-bar { background: var(--amarelo); box-shadow: 0 0 10px var(--amarelo); }

        #playlist-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 77, 109, 0.2); border: 2px solid var(--rosa);
            padding: 10px 20px; border-radius: 50px; color: #fff;
            text-decoration: none; display: none; align-items: center; gap: 10px;
            font-weight: bold; font-size: 13px; box-shadow: 0 0 15px var(--rosa-brilho);
            animation: pulse-glow 2s infinite; transition: 0.3s;
        }
        
        .disco { width: 20px; height: 20px; background: #111; border-radius: 50%; border: 3px double var(--rosa); animation: girar 2s linear infinite; }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        #speed-lines {
            position: fixed; inset: 0; pointer-events: none; opacity: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,215,0,0.1) 50%, transparent 100%);
            background-size: 400% 100%; z-index: 2;
        }
        .vibe-ativa #speed-lines { opacity: 1; animation: moveLines 0.2s linear infinite; }
        @keyframes moveLines { from { background-position: 100% 0; } to { background-position: 0% 0; } }

        /* [2] EFEITO DE BRILHO NOS NEGRITOS */
        b, strong { 
            color: var(--rosa); 
            font-weight: 800; 
            text-shadow: 0 0 8px var(--rosa-brilho);
            transition: 0.3s;
            cursor: default;
        }
        b:hover, strong:hover {
            text-shadow: 0 0 15px var(--rosa);
            filter: brightness(1.2);
        }

        .vibe-ativa h2 { color: var(--amarelo) !important; text-shadow: 0 0 20px var(--amarelo) !important; }
        .vibe-ativa b, .vibe-ativa strong { color: var(--amarelo) !important; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5) !important; }

        .particle { position: absolute; border-radius: 50%; background: #fff; opacity: 0.2; animation: flutuar var(--d) infinite ease-in-out; pointer-events: none; }
        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        .card {
            background: rgba(20, 0, 10, 0.95);
            border: 2px solid var(--rosa); border-radius: 30px;
            padding: 30px; width: 95%; max-width: 900px;
            display: none; grid-template-columns: 1fr 1.3fr; gap: 25px;
            box-shadow: 0 0 50px var(--rosa-brilho);
            position: relative; z-index: 10; transition: 0.5s;
        }
        .active { display: grid; animation: entrar 0.5s ease; }

        .vibe-ativa .card.active { 
            border-color: var(--amarelo); 
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
            animation: engineStart 0.3s ease-in-out; 
        }

        @media (max-width: 768px) {
            .card { grid-template-columns: 1fr; max-height: 85vh; overflow-y: auto; padding: 20px; width: 92%; }
            .media { height: 180px !important; }
            h2 { font-size: 32px !important; }
            .texto { font-size: 15px !important; }
        }

        @keyframes engineStart {
            0% { transform: scale(1); }
            25% { transform: scale(1.02) rotate(1deg); }
            50% { transform: scale(0.98) rotate(-1deg); }
            100% { transform: scale(1); }
        }

        .media { border-radius: 15px; overflow: hidden; height: 350px; border: 1px solid var(--rosa); transition: 0.5s; }
        .vibe-ativa .media { border-color: var(--amarelo); }
        .media img { width: 100%; height: 100%; object-fit: cover; }

        h2 { font-family: 'Dancing Script', cursive; color: var(--rosa); font-size: 45px; margin-bottom: 8px; transition: 0.5s; }
        .texto { font-size: 17px; line-height: 1.5; color: #ffeef2; min-height: 160px; white-space: pre-line; position: relative; }
        
        .typing::after { content: '|'; animation: blink 0.7s infinite; color: var(--rosa); font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #contador {
            margin-top: 15px; font-size: 14px; color: var(--rosa); font-weight: bold;
            background: rgba(255, 77, 109, 0.1); padding: 12px; border-radius: 15px;
            border: 1px dashed var(--rosa); display: none; text-align: center;
        }
        .vibe-ativa #contador { color: var(--amarelo); border-color: var(--amarelo); background: rgba(255, 215, 0, 0.05); }

        .dorme-link { cursor: pointer; text-decoration: underline; color: inherit; font-weight: bold; }

        #sleep-overlay {
            position: fixed; inset: 0; background: #000; z-index: 20000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: #fff; transition: 1s; opacity: 0;
        }
        .btn-acordar {
            margin-top: 40px; background: transparent; border: 2px solid #fff;
            color: #fff; padding: 10px 40px; border-radius: 50px; font-weight: 800; cursor: pointer;
        }

        .dock { position: fixed; bottom: 30px; display: flex; gap: 15px; z-index: 100; }
        .btn-nav { padding: 12px 30px; border-radius: 50px; border: none; cursor: pointer; font-weight: 800; background: var(--rosa); color: #fff; text-transform: uppercase; font-size: 13px; transition: 0.3s; }

        .camaro-btn {
            margin-top: 15px; background: #222; color: #fff;
            padding: 12px 20px; border-radius: 10px; font-weight: 900;
            border: 2px solid var(--amarelo); cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 11px; width: 100%;
        }
        .btn-on { background: var(--amarelo) !important; color: #000 !important; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px); } 100% { transform: translate(-1px); } }

        #capa { position: fixed; inset: 0; background: #1a0510; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s; }
        .presente-container { position: relative; width: 140px; height: 140px; cursor: pointer; animation: pular 1.2s infinite; }
        .caixa-corpo { width: 100%; height: 100%; background: var(--rosa); border-radius: 10px; position: relative; box-shadow: 0 0 40px var(--rosa-brilho); transition: 0.8s; }
        .caixa-corpo::after { content: ''; position: absolute; top: 0; left: 42%; width: 16%; height: 100%; background: #fff; }
        .caixa-corpo::before { content: ''; position: absolute; top: 42%; left: 0; width: 100%; height: 16%; background: #fff; }
        .tampa { position: absolute; top: -15px; left: -5%; width: 110%; height: 35px; background: var(--rosa); border-radius: 5px; z-index: 2; transition: 0.8s; }
        .aberto .tampa { transform: translateY(-150px) rotate(25deg); opacity: 0; }
        .aberto .caixa-corpo { transform: scale(0); opacity: 0; }

        .explosao-item { position: fixed; pointer-events: none; z-index: 9999; animation: explodeOut 2s forwards ease-out; font-weight: 900; }
        @keyframes explodeOut {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @keyframes pular { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes entrar { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body id="corpo">

    <div id="progress-bar"></div>
    <div id="speed-lines"></div>
    
    <div id="parallax-bg">
        <div id="particles-container"></div>
    </div>

    <div id="sleep-overlay">
        <h1 style="font-family: 'Dancing Script'; font-size: 60px;">Zzz...</h1>
        <p>dormiu que passou</p>
        <button onclick="acordar()" class="btn-acordar">ACORDAR</button>
    </div>

    <a href="https://open.spotify.com/playlist/2MyiOnallvvVs1U2B1wzWo?si=KkuxvG4rSkWeQD-_hhaGyw" target="_blank" id="playlist-btn">
        <div class="disco"></div>
        <span>Nossa Playlist</span>
    </a>

    <div id="capa">
        <h1 id="titulo-capa" style="font-family: 'Dancing Script'; font-size: 40px; color: var(--rosa); margin-bottom: 40px; text-align: center; padding: 0 20px;">Para a Grazi... ✨</h1>
        <div class="presente-container" onclick="iniciar(this)">
            <div class="tampa"></div>
            <div class="caixa-corpo"></div>
        </div>
        <p style="margin-top: 30px; color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 2px;">CLIQUE NO PRESENTE</p>
    </div>

    <div id="c1" class="card"><div class="media"><img src="https://i.pinimg.com/originals/f0/ae/8b/f0ae8bc86ab9b5459880ea9e8894774d.gif"></div><div><h2>Olá, Grazi 🌸</h2><div id="t1" class="texto"></div></div></div>
    <div id="c2" class="card"><div class="media"><img src="https://i.pinimg.com/originals/5f/9d/40/5f9d4041c5b505d18842b2b47e9c8775.gif"></div><div><h2>23 de Abril ✨</h2><div id="t2" class="texto"></div><div id="contador"></div></div></div>
    <div id="c3" class="card"><div class="media"><img src="https://i.pinimg.com/originals/16/2c/a1/162ca1d463e0d4c848fee9bd01d3042e.gif"></div><div><h2>Nossa vibe... 🎶</h2><div id="t3" class="texto"></div><button class="camaro-btn" id="btn-camaro" onclick="toggleCamaro()">🏎️ ACIONAR VIBE CAMARO</button></div></div>
    <div id="c4" class="card"><div class="media"><img src="https://media.tenor.com/pOGPqDU93s0AAAAM/cat-phone-cat.gif"></div><div><h2>Calls e Jogos... 🎧</h2><div id="t4" class="texto"></div></div></div>
    <div id="c5" class="card"><div class="media"><img src="https://i.pinimg.com/originals/73/0d/75/730d75ed729397068c7a89fa7476e305.gif"></div><div><h2>Especial ❤️</h2><div id="t5" class="texto"></div></div></div>
    <div id="c6" class="card"><div class="media"><img src="https://i.pinimg.com/originals/e1/43/92/e14392b3bb9f745025a5cf6a9abe11be.gif"></div><div><h2>Para você... 🌹</h2><div id="t6" class="texto"></div></div></div>
    <div id="c7" class="card"><div class="media"><img src="https://i.pinimg.com/736x/f6/df/54/f6df54fc1a82fb6b1ac48cf6dbd1170b.jpg"></div><div><h2>Feliz aniversário 🥳</h2><div id="t7" class="texto"></div></div></div>

    <div class="dock" id="dock"></div>

    <audio id="musica" loop><source src="https://files.catbox.moe/qzyweo.mp3" type="audio/mpeg"></audio>
    <audio id="som-click"><source src="https://www.fesliyanstudios.com/play-mp3/6" type="audio/mpeg"></audio>

    <script>
        const msgs = {
            1: `Olaaa, Grazi! Espero que o seu dia esteja sendo maravilhoso nesse seu aniversário. Eu espero que eu não tenha te tirado do sério até agora, ainda mais em um dia tão especial. Eu já devo ter te falado isso, essa foi a minha primeira experiência criando um site… mesmo assim, espero de coração que você goste ❤️`,
            2: `Quem diria que, há 19 anos, nessa mesma data, nasceria alguém tão pitica e maravilhosa... Mas agora falando sério: que o seu dia especial seja incrível, e que eu possa torná-lo ainda melhor com esse site. Fico muito feliz por comemorar essa data ao seu lado. \n\nVocê é uma pessoa com vários lados, e todos eles eu gosto muito. **Você é maravilhosa** e consegue deixar tudo ao redor mais leve e mais simples ❤️.`,
            3: `Sempre que eu ver um Camaro Amarelo, eu vou me lembrar de você cantando essa música baixinho na ligação. Você deixa tudo mais leve.`,
            4: `Eu amo o fato de que a gente pode passar horas conversando sobre tudo e sobre nada ao mesmo tempo. Jogar com você é o meu passatempo favorito, e eu não trocaria nossas madrugadas em call por nada nesse mundo (mesmo você me trocando por um salgado e um refresco 😓).`,
            5: `Sua inteligência, seu senso de humor e o seu jeito único de ser me encantam todos os dias. Todos os momentos que a gente tem junto eu vejo como eu sou sortudo **por ter você na minha vida.**`,
            6: `Eu nunca tinha feito nada parecido, mas por você eu quis aprender. Todo o esforço e os dias que passei aprendendo a criar este site valeram a pena. Esse é o meu presente 'feito à mão', e espero que você sinta, em cada detalhe, o carinho enorme que coloquei aqui.`,
            7: `E, por fim, eu agradeço muito por você me aturar todos os dias. Eu fiz isso mais como uma forma de agradecimento por você ser como é: uma pessoa amiga, parceira e um amor de pessoa. Eu espero que eu possa estar nos próximos aniversários contigo. E se você não gostou, **dorme que passa!** Eu fico muito feliz que eu tenha ido dormir tarde para jogar aquela partida de LoL e pude conhecer o **melhor duo** que poderia imaginar. Mais uma vez, feliz aniversário e que você conquiste tudo de bom na sua vida. Sempre irei torcer por você. **Te amo! <3**`
        };

        function playClick() {
            const click = document.getElementById('som-click');
            click.volume = 0.2; click.currentTime = 0; click.play().catch(()=>{});
        }

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            document.getElementById('parallax-bg').style.transform = `translateX(${x}px) translateY(${y}px)`;
        });

        window.addEventListener('deviceorientation', (e) => {
            const x = e.gamma / 2.5; const y = e.beta / 2.5;
            document.getElementById('parallax-bg').style.transform = `translateX(${x}px) translateY(${y}px)`;
        });

        function iniciar(presente) {
            playClick();
            presente.parentElement.classList.add('aberto');
            setTimeout(() => {
                document.getElementById('musica').play().catch(()=>{});
                document.getElementById('capa').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('capa').style.display = 'none';
                    document.getElementById('playlist-btn').style.display = 'flex';
                    nav(1);
                }, 1000);
            }, 800);
        }

        function toggleCamaro() {
            playClick();
            const body = document.getElementById('corpo');
            const audio = document.getElementById('musica');
            body.classList.toggle('vibe-ativa');
            if(body.classList.contains('vibe-ativa')) {
                document.getElementById('btn-camaro').innerText = "DOCE IGUAL CARAMELO! 🏎️💨";
                document.getElementById('btn-camaro').classList.add('btn-on'); audio.currentTime = 66; 
            } else {
                document.getElementById('btn-camaro').innerText = "🏎️ ACIONAR VIBE CAMARO";
                document.getElementById('btn-camaro').classList.remove('btn-on'); audio.currentTime = 0; 
            }
        }

        function nav(n) {
            playClick();
            clearInterval(window.typingTimer);
            document.documentElement.style.setProperty('--progresso', `${(n/7)*100}%`);
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.getElementById('c' + n).classList.add('active');
            
            if(n === 2) {
                const dias = Math.floor((new Date() - new Date('2025-12-27')) / 86400000);
                const el = document.getElementById('contador');
                el.style.display = 'block';
                el.innerHTML = `✨ Já são **${dias} dias** colorindo a minha vida!`;
            }

            const d = document.getElementById('dock'); d.innerHTML = '';
            if(n > 1) {
                const b = document.createElement('button'); b.className = 'btn-nav';
                b.style.background = '#444'; b.innerText = 'Voltar'; b.onclick = () => nav(n-1); d.appendChild(b);
            }
            const prox = document.createElement('button'); prox.className = 'btn-nav';
            prox.innerText = n === 7 ? 'TE AMO ❤️' : 'Continuar';
            prox.onclick = n === 7 ? () => explosaoFinal() : () => nav(n+1);
            d.appendChild(prox);

            let i = 0; const el = document.getElementById('t' + n); el.innerHTML = "";
            el.classList.add('typing');
            window.typingTimer = setInterval(() => {
                if(i <= msgs[n].length) {
                    let txt = msgs[n].substring(0, i).replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                    if(n === 7) txt = txt.replace("dorme que passa!", "<span class='dorme-link' onclick='dormir()'>dorme que passa!</span>");
                    el.innerHTML = txt; i++;
                } else { clearInterval(window.typingTimer); el.classList.remove('typing'); }
            }, 5);
        }

        function dormir() {
            playClick();
            const ov = document.getElementById('sleep-overlay');
            ov.style.display = 'flex';
            setTimeout(() => { ov.style.opacity = '1'; }, 10);
        }

        function acordar() {
            const ov = document.getElementById('sleep-overlay');
            ov.style.opacity = '0';
            setTimeout(() => { ov.style.display = 'none'; }, 1000);
        }

        function explosaoFinal() {
            playClick();
            for(let i=0; i<80; i++) {
                const item = document.createElement('div');
                item.className = 'explosao-item';
                item.innerHTML = i % 2 === 0 ? "TE AMO" : "❤️";
                item.style.color = i % 2 === 0 ? "#fff" : "#ff4d6d";
                item.style.left = "50vw"; item.style.top = "50vh";
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 1000 + 500;
                item.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
                item.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
                document.body.appendChild(item);
                setTimeout(() => item.remove(), 2000);
            }
        }

        const container = document.getElementById('particles-container');
        for(let i=0; i<60; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 4 + 2 + 'px';
            p.style.left = Math.random() * 110 + 'vw'; p.style.top = Math.random() * 110 + 'vh';
            p.style.background = i % 2 === 0 ? '#ff4d6d' : '#fff';
            p.style.setProperty('--d', (Math.random() * 5 + 3) + 's');
            container.appendChild(p);
        }
    </script>
</body>
</html>
